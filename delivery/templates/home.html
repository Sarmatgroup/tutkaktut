<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Доставка Go</title>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=2edccfe7-7e65-461f-9472-0c1b7cf04983&lang=ru_RU" type="text/javascript"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; font-family: 'Segoe UI', Helvetica, Arial, sans-serif; overflow: hidden; background: #000; }
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        .bottom-sheet {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(0);
            width: 100%; max-width: 500px; background: #ffffff;
            border-radius: 24px 24px 0 0; box-shadow: 0 -5px 30px rgba(0,0,0,0.15);
            z-index: 10; padding: 0 24px 34px 24px;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            user-select: none; max-height: 85vh; overflow-y: auto;
        }
        @media (max-width: 500px) { .bottom-sheet { max-width: 100%; border-radius: 20px 20px 0 0; padding: 0 16px 24px 16px; } }
        .bottom-sheet.minimized { transform: translateX(-50%) translateY(calc(100% - 60px)); }
        .sheet-handle { width: 100%; height: 30px; display: flex; justify-content: center; align-items: center; cursor: grab; }
        .sheet-handle::before { content: ''; width: 40px; height: 5px; background: #ccced1; border-radius: 3px; }
        .sheet-handle:active { cursor: grabbing; }
        .content-section { display: block; }
        .hidden { display: none !important; }
        input[type="text"], input[type="tel"], textarea { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 16px; background: #f8fafc; outline: none; }
        .tariffs-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .tariff-btn { flex: 1; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; cursor: pointer; text-align: center; background: #f8fafc; font-size: 15px; font-weight: 600; color: #475569; }
        .tariff-btn.active { border-color: #f59e0b; background: #fef3c7; color: #b45309; }
        .price-display { font-size: 20px; font-weight: 700; color: #1e293b; margin-bottom: 15px; }
        .submit-btn { width: 100%; padding: 15px; background: #e2e8f0; color: #94a3b8; border: none; border-radius: 14px; font-size: 16px; font-weight: bold; cursor: not-allowed; transition: 0.2s; }
        .submit-btn.ready { background: #FFCC00; color: #000; cursor: pointer; }
        .status-section { text-align: center; padding: 10px 0 0 0; position: relative; }
        .status-title { font-size: 22px; font-weight: bold; color: #1e293b; margin-bottom: 20px; padding-right: 30px; padding-left: 30px; }
        
        /* Кнопка-крестик закрытия */
        .close-status-btn { position: absolute; top: -5px; right: 0; font-size: 28px; font-weight: bold; color: #94a3b8; cursor: pointer; transition: 0.2s; user-select: none; line-height: 1; }
        .close-status-btn:hover { color: #1e293b; }

        .radar-box { width: 80px; height: 80px; margin: 20px auto; position: relative; display: flex; justify-content: center; align-items: center; }
        .radar-svg { width: 40px; height: 40px; fill: #f59e0b; z-index: 2; }
        .pulse-ring { position: absolute; width: 100%; height: 100%; border: 2px solid #FFCC00; border-radius: 50%; animation: modernPulse 2s linear infinite; opacity: 0; }
        .pulse-ring.delay { animation-delay: 1s; }
        @keyframes modernPulse { 0% { transform: scale(0.6); opacity: 0.8; } 100% { transform: scale(2.2); opacity: 0; } }
        .icon-container { width: 80px; height: 80px; margin: 20px auto; display: none; justify-content: center; align-items: center; }
        .icon-container svg { width: 60px; height: 60px; }
        .order-summary { text-align: left; background: #f8fafc; padding: 16px; border-radius: 14px; font-size: 15px; color: #334155; line-height: 1.6; border: 1px solid #f1f5f9; }
        .cancel-btn { width: 100%; margin-top: 20px; padding: 14px; background: transparent; color: #ef4444; border: 2px solid #fecaca; border-radius: 14px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .cancel-btn:hover { background: #fef2f2; border-color: #ef4444; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="bottom-sheet" id="bottomSheet">
        <div class="sheet-handle" id="sheetHandle"></div>

        <div class="content-section" id="formSection">
            <form id="orderForm">
                {% csrf_token %}
                <input type="text" name="address_from" id="id_addr_from" placeholder="Откуда (нажмите на карту)" required readonly>
                <input type="text" name="address_to" id="id_addr_to" placeholder="Куда (нажмите на карту)" required readonly>
                <input type="hidden" name="distance" id="id_distance" value="0">

                <div class="tariffs-container">
                    {% for tariff in tariffs %}
                        <div class="tariff-btn" onclick="selectTariff(this, '{{ tariff.id }}', '{{ tariff.price_per_km }}', '{{ tariff.base_price }}')">
                            {{ tariff.name }}
                        </div>
                    {% endfor %}
                </div>
                <input type="hidden" name="tariff_id" id="selected_tariff" required>
                
                <div class="price-display">Стоимость: <span id="price_text">0</span> ₽ <small id="dist_text" style="color: #64748b; font-size: 13px; font-weight: normal;"></small></div>

                <input type="tel" name="client_phone" placeholder="Ваш номер телефона" required>
                <textarea name="comment" rows="2" placeholder="Комментарий курьеру"></textarea>
                
                <button type="submit" class="submit-btn" id="submit_btn" disabled>Заказать</button>
            </form>
        </div>

        <div class="content-section hidden" id="statusSection">
            <div class="status-section">
                <span id="closeStatusBtn" class="close-status-btn hidden">&times;</span>

                <div id="statusTitle" class="status-title" style="color: #f59e0b;">Поиск курьера...</div>
                
                <div class="radar-box" id="statusRadar">
                    <div class="pulse-ring"></div>
                    <div class="pulse-ring delay"></div>
                    <svg class="radar-svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                </div>

                <div class="icon-container" id="statusCourierIcon">
                    <svg viewBox="0 0 24 24" fill="#28a745"><path d="M15.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM5 12c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5zm0 8.5c-1.9 0-3.5-1.6-3.5-3.5s1.6-3.5 3.5-3.5 3.5 1.6 3.5 3.5-1.6 3.5-3.5 3.5zm14.2-10l-2.3-2.3c-.3-.3-.8-.5-1.2-.5H12c-.6 0-1.1.4-1.3 1L9 14.3c-.2.5.1 1.1.7 1.3.5.2 1.1-.1 1.3-.7l1.4-4.2h1.9l-2.8 5.6c-.3.6-.1 1.3.4 1.7l3.7 3c.3.2.6.3.9.3.4 0 .8-.2 1.1-.5.5-.5.4-1.3-.1-1.8l-2.7-2.2 2.2-4.4 1.7 1.7c.4.4 1 .5 1.5.3l3.2-1.1c.5-.2.8-.8.6-1.3-.3-.5-.9-.8-1.4-.6l-2.6.9zm-.2 3.5c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5zm0 8.5c-1.9 0-3.5-1.6-3.5-3.5s1.6-3.5 3.5-3.5 3.5 1.6 3.5 3.5-1.6 3.5-3.5 3.5z"/></svg>
                </div>

                <div class="order-summary">
                    <div><strong>Откуда:</strong> <span id="summaryFrom"></span></div>
                    <div><strong>Куда:</strong> <span id="summaryTo"></span></div>
                    <div><strong>Цена:</strong> <span id="summaryPrice"></span> ₽</div>
                </div>

                <button type="button" class="cancel-btn" id="cancelBtn">Отменить заказ</button>
            </div>
        </div>
    </div>

<script>
    let currentTariffPriceKm = 0;
    let currentTariffBase = 0;
    const GEOCODER_API_KEY = '7a5ae996-7085-4c1f-9aab-95daec02af5e';
    
    let pollingIntervalId = null; 
    let currentActiveOrderId = null;
    let globalMap = null;
    let placemarkFrom = null, placemarkTo = null;

    // СВАЙПЫ ШТОРКИ
    const sheet = document.getElementById('bottomSheet');
    const handle = document.getElementById('sheetHandle');
    let startY, isDragging = false;

    function initDrag(e) { startY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY; isDragging = true; sheet.style.transition = 'none'; }
    function doDrag(e) { if (!isDragging) return; let currentY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY; let deltaY = currentY - startY; if (deltaY < 0) deltaY = deltaY * 0.2; if (deltaY > 0 || sheet.classList.contains('minimized')) { sheet.style.transform = `translateX(-50%) translateY(${deltaY}px)`; } }
    function endDrag(e) { if (!isDragging) return; isDragging = false; sheet.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)'; let currentY = e.type === 'touchend' ? e.changedTouches[0].clientY : e.clientY; let deltaY = currentY - startY; if (deltaY > 100) { sheet.classList.add('minimized'); } else { sheet.classList.remove('minimized'); } sheet.style.transform = ''; }
    handle.addEventListener('mousedown', initDrag); window.addEventListener('mousemove', doDrag); window.addEventListener('mouseup', endDrag);
    handle.addEventListener('touchstart', initDrag); window.addEventListener('touchmove', doDrag); window.addEventListener('touchend', endDrag);

    // КАЛЬКУЛЯТОР СТОИМОСТИ
    function updatePrice() {
        let dist = parseFloat(document.getElementById('id_distance').value) || 0;
        document.getElementById('dist_text').innerText = dist > 0 ? `(${dist} км)` : '';
        if (!document.getElementById('selected_tariff').value) return;
        let finalPrice = Math.round((dist * currentTariffPriceKm) + currentTariffBase);
        document.getElementById('price_text').innerText = finalPrice;
    }

    function selectTariff(el, id, priceKm, base) {
        document.querySelectorAll('.tariff-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('selected_tariff').value = id;
        currentTariffPriceKm = parseFloat(priceKm.replace(',', '.')) || 0;
        currentTariffBase = parseFloat(base.replace(',', '.')) || 0;
        let btn = document.getElementById('submit_btn');
        btn.disabled = false; btn.classList.add('ready');
        updatePrice();
    }

    function getAddress(coords, callback) {
        fetch(`https://geocode-maps.yandex.ru/1.x/?apikey=${GEOCODER_API_KEY}&format=json&geocode=${coords[1]},${coords[0]}`)
            .then(res => res.json()).then(data => {
                callback(data.response.GeoObjectCollection.featureMember[0].GeoObject.metaDataProperty.GeocoderMetaData.text);
            }).catch(() => callback("Неизвестный адрес"));
    }

    // НАСТРОЙКА КАРТЫ НА ГУСЕВ
    ymaps.ready(function() {
        globalMap = new ymaps.Map("map", { 
            center: [54.5912, 22.1993], 
            zoom: 14, 
            controls: [] 
        }, { suppressMapOpenBlock: true });
        
        let clickState = 0;

        globalMap.events.add('click', function (e) {
            if (!document.getElementById('statusSection').classList.contains('hidden')) return;

            var coords = e.get('coords');
            if (clickState === 0) {
                if (placemarkFrom) globalMap.geoObjects.remove(placemarkFrom);
                if (placemarkTo) globalMap.geoObjects.remove(placemarkTo);
                document.getElementById('id_addr_to').value = '';
                document.getElementById('id_distance').value = '0';
                placemarkFrom = new ymaps.Placemark(coords, { iconCaption: 'Откуда' }, { preset: 'islands#greenDotIcon' });
                globalMap.geoObjects.add(placemarkFrom);
                getAddress(coords, function(addr) { document.getElementById('id_addr_from').value = addr; updatePrice(); });
                clickState = 1;
            } else {
                if (placemarkTo) globalMap.geoObjects.remove(placemarkTo);
                placemarkTo = new ymaps.Placemark(coords, { iconCaption: 'Куда' }, { preset: 'islands#redDotIcon' });
                globalMap.geoObjects.add(placemarkTo);
                getAddress(coords, function(addr) {
                    document.getElementById('id_addr_to').value = addr;
                    ymaps.route([placemarkFrom.geometry.getCoordinates(), coords]).then(function (route) {
                        document.getElementById('id_distance').value = (route.getLength() / 1000).toFixed(1);
                        updatePrice();
                    }, function () {
                        let dist = (ymaps.coordSystem.geo.distance(placemarkFrom.geometry.getCoordinates(), coords) / 1000 * 1.2).toFixed(1);
                        document.getElementById('id_distance').value = dist;
                        updatePrice();
                    });
                });
                clickState = 0;
            }
        });
    });

    // ОТПРАВКА ФОРМЫ КЛИЕНТОМ
    document.getElementById('orderForm').addEventListener('submit', function(e) {
        e.preventDefault();
        let formData = new FormData(this);
        
        document.getElementById('summaryFrom').innerText = document.getElementById('id_addr_from').value;
        document.getElementById('summaryTo').innerText = document.getElementById('id_addr_to').value;
        document.getElementById('summaryPrice').innerText = document.getElementById('price_text').innerText;

        fetch("{% url 'home' %}", { method: 'POST', body: formData })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                currentActiveOrderId = data.order_id;
                document.getElementById('formSection').classList.add('hidden');
                document.getElementById('statusSection').classList.remove('hidden');
                sheet.classList.remove('minimized');

                // Запускаем отслеживание статуса
                startStatusPolling(data.order_id);
            } else {
                alert('Ошибка: ' + data.message);
            }
        });
    });

    // НАСТОЯЩЕЕ ОТСЛЕЖИВАНИЕ СТАТУСА (POLLING)
    function startStatusPolling(orderId) {
        const title = document.getElementById('statusTitle');
        const radar = document.getElementById('statusRadar');
        const icon = document.getElementById('statusCourierIcon');
        const cancelBtn = document.getElementById('cancelBtn');
        const closeBtn = document.getElementById('closeStatusBtn');

        // Сброс видимости кнопок при старте нового заказа
        cancelBtn.classList.remove('hidden');
        closeBtn.classList.add('hidden');
        radar.style.display = 'flex';
        icon.style.display = 'none';
        title.innerText = 'Поиск курьера...';
        title.style.color = '#f59e0b';

        pollingIntervalId = setInterval(() => {
            fetch(`/order/${orderId}/status/`)
            .then(res => res.json())
            .then(data => {
                if (data.status === 'accepted') {
                    radar.style.display = 'none';
                    icon.style.display = 'flex';
                    title.innerText = 'Курьер найден и едет к вам!';
                    title.style.color = '#28a745';
                } 
                else if (data.status === 'delivered') {
                    radar.style.display = 'none';
                    icon.style.display = 'flex';
                    title.innerText = 'Курьер забрал заказ (Доставка)';
                    title.style.color = '#007bff';
                    
                    // ТРЕБОВАНИЕ: Пропадает кнопка отмены заказа
                    cancelBtn.classList.add('hidden');
                }
                else if (data.status === 'completed') {
                    clearInterval(pollingIntervalId);
                    radar.style.display = 'none';
                    icon.style.display = 'flex';
                    
                    // ТРЕБОВАНИЕ: Статус "Заказ доставлен" + появляется крестик
                    title.innerText = 'Заказ доставлен!';
                    title.style.color = '#10b981';
                    
                    cancelBtn.classList.add('hidden'); // На всякий случай дублируем скрытие отмены
                    closeBtn.classList.remove('hidden'); // Показываем крестик
                }
            });
        }, 3000);
    }

    // ОТМЕНА ЗАКАЗА КЛИЕНТОМ (До взятия в работу)
    document.getElementById('cancelBtn').addEventListener('click', function() {
        if (pollingIntervalId) clearInterval(pollingIntervalId);

        if (currentActiveOrderId) {
            fetch(`/order/${currentActiveOrderId}/update/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'cancelled' })
            });
        }

        document.getElementById('statusSection').classList.add('hidden');
        document.getElementById('formSection').classList.remove('hidden');
        sheet.classList.remove('minimized');
    });

    // ТРЕБОВАНИЕ: Нажатие на крестик кидает обратно на форму заказа
    document.getElementById('closeStatusBtn').addEventListener('click', function() {
        // Переключаем экраны шторки обратно
        document.getElementById('statusSection').classList.add('hidden');
        document.getElementById('formSection').classList.remove('hidden');
        sheet.classList.remove('minimized');
        
        // Полностью очищаем форму
        document.getElementById('orderForm').reset();
        document.getElementById('price_text').innerText = '0';
        document.getElementById('dist_text').innerText = '';
        document.getElementById('selected_tariff').value = '';
        document.querySelectorAll('.tariff-btn').forEach(b => b.classList.remove('active'));
        
        let submitBtn = document.getElementById('submit_btn');
        submitBtn.disabled = true; 
        submitBtn.classList.remove('ready');

        // Очищаем маркеры с карты
        if (globalMap) {
            if (placemarkFrom) globalMap.geoObjects.remove(placemarkFrom);
            if (placemarkTo) globalMap.geoObjects.remove(placemarkTo);
            placemarkFrom = null;
            placemarkTo = null;
        }

        // Прячем крестик до следующего завершенного заказа
        this.classList.add('hidden');
    });
</script>
</body>
</html>
